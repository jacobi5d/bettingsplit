name: Run Scraper

on:
  workflow_dispatch: # Allows you to run it manually from the Actions tab
  schedule:
    - cron: '0 12 * * *' # Example: Runs automatically every day at 12:00 UTC

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Prerequisite 1 (Python Libraries)
        run: |
          python -m pip install --upgrade pip
          pip install undetected-chromedriver selenium beautifulsoup4 pandas

      - name: Install Prerequisite 2 (Inject Cookies Securely)
        env:
          # Pulls the secret you created in the GitHub UI
          COOKIES_JSON: ${{ secrets.ACTION_NETWORK_COOKIES }}
        run: |
          # Writes the secret string into a cookies.json file in the runner
          echo "$COOKIES_JSON" > cookies.json

      - name: Install Virtual Display (Required for Undetected Chromedriver)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run Scraper
        # xvfb-run fakes a display so undetected-chromedriver doesn't crash in a headless Linux environment
        run: xvfb-run python scraper.py
