name: Daily Sports Betting Scraper

# Define when the script runs
on:
  schedule:
    # Runs at 10:00 UTC (6:00 AM Eastern Time) every day
    - cron: '0 10 * * *'
  # Allows you to run the script manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          # Install headless browser binaries
          playwright install chromium --with-deps

      - name: Run Scraper Script
        # Pass the GitHub Secrets as environment variables to the Python script
        env:
          ACTION_NETWORK_EMAIL: ${{ secrets.ACTION_NETWORK_EMAIL }}
          ACTION_NETWORK_PASSWORD: ${{ secrets.ACTION_NETWORK_PASSWORD }}
        run: python scraper.py

      - name: Commit and Push CSV
        # This step takes the newly generated CSV and saves it back into your repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add betting_splits.csv
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update of betting splits data" && git push)
